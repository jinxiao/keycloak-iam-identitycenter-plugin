name: Maven Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Resolve release version
      id: release_version
      shell: bash
      run: |
        TAG='${{ github.event.release.tag_name }}'
        VERSION="${TAG#v}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Build with Maven
      run: mvn -B -DskipTests -Drevision=${{ steps.release_version.outputs.version }} package --file pom.xml

    - name: Publish to GitHub Packages Apache Maven
      run: mvn -B -DskipTests -Drevision=${{ steps.release_version.outputs.version }} deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
