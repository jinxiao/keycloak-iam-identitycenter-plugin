name: Release JAR

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          TAG='${{ github.event.release.tag_name }}'
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build with Maven
        run: mvn -B -DskipTests -Drevision=${{ steps.release_version.outputs.version }} package --file pom.xml

      - name: Upload JARs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/*.jar
            !target/original-*.jar
